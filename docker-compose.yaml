services:
  myservice:
    build: .
    ports:
      - "8082:8080"
      # - "8085:8085" # для метрик
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=myservice
      - DB_PASSWORD=myservice
      - DB_NAME=myservice_db
      - PG_CONNECTION=postgresql://myservice:myservice@postgres:5432/myservice_db
      - MONGO_CONNECTION=mongodb://mongodb:27017/myservice_mongo
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DATABASE=myservice_mongo
      # - KAFKA_BROKERS=kafka-broker1:9092,kafka-broker2:9095
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      # kafka:
      #   condition: service_started
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    networks:
      - myservice_network

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8083:8080"
    environment:
      - SWAGGER_JSON=/openapi.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro
    restart: unless-stopped
    networks:
      - myservice_network

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: myservice
      POSTGRES_PASSWORD: myservice
      POSTGRES_DB: myservice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./postgresql/schemas:/docker-entrypoint-initdb.d:ro
      - ./postgresql/schemas/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./postgresql/schemas/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
      # - ./postgresql/schemas/bigger_data.sql:/docker-entrypoint-initdb.d/03_bigger_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myservice -d myservice_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - myservice_network

  mongodb:
    image: mongo:7
    container_name: myservice-mongodb-1
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/validation.js:/docker-entrypoint-initdb.d/01_validation.js:ro
      - ./mongodb/data.js:/docker-entrypoint-initdb.d/02_data.js:ro
    networks:
      - myservice_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  
