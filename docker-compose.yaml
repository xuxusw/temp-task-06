    environment:
      KAFKA_CLUSTERS_0_NAME: "myservice-kafka"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      # KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka-broker1:9092,kafka-broker2:9095"
      KAFKA_CLUSTERS_0_ZOOKEEPER: "" # KRaft mode - no zookeeper
    depends_on:
      # - kafka-broker1
      # - kafka-broker2
      - kafka
    networks:
      - myservice_network

