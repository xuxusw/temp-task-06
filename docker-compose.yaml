services:
  myservice:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=myservice
      - DB_PASSWORD=myservice
      - DB_NAME=myservice_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    environment:
      - SWAGGER_JSON=/openapi.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro
    restart: unless-stopped

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: myservice
      POSTGRES_PASSWORD: myservice
      POSTGRES_DB: myservice_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myservice -d myservice_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/validation.js:/docker-entrypoint-initdb.d/01_validation.js:ro
      - ./mongodb/data.js:/docker-entrypoint-initdb.d/02_data.js:ro
    restart: unless-stopped
    command: mongod --bind_ip_all

volumes:
  postgres_data:
  mongodb_data: